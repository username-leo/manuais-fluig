<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('code.language-mermaid').forEach(function (el) {
      var source = el.textContent;

      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:relative;margin:2rem 0;';

      var btn = document.createElement('button');
      btn.textContent = '⛶';
      btn.title = 'Expandir diagrama';
      btn.style.cssText = 'position:absolute;top:8px;right:8px;background:#30363d;color:#e6edf3;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:16px;z-index:10;';

      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = source;

      wrapper.appendChild(btn);
      wrapper.appendChild(div);
      el.parentNode.replaceWith(wrapper);

      btn.addEventListener('click', function () {
        var svg = div.querySelector('svg');
        if (!svg) return;

        var modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:2rem;box-sizing:border-box;';

        var closeBtn = document.createElement('button');
        closeBtn.textContent = '✕ Fechar';
        closeBtn.style.cssText = 'position:fixed;top:16px;right:16px;background:#30363d;color:#e6edf3;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;font-size:14px;z-index:10000;';

        var svgClone = svg.cloneNode(true);
        svgClone.style.cssText = 'width:90vw;max-width:1400px;height:auto;';
        svgClone.removeAttribute('width');
        svgClone.removeAttribute('height');

        modal.appendChild(closeBtn);
        modal.appendChild(svgClone);
        document.body.appendChild(modal);

        closeBtn.addEventListener('click', function () { document.body.removeChild(modal); });
        modal.addEventListener('click', function (e) { if (e.target === modal) document.body.removeChild(modal); });
      });
    });

    mermaid.initialize({
      startOnLoad: true,
      theme: 'dark',
      timeline: { useMaxWidth: false }
    });
  });
</script>

<style>
  .main-content { max-width: 1100px !important; }

  .main-content,
  .main-content p,
  .main-content li,
  .main-content td,
  .main-content th,
  .main-content h1,
  .main-content h2,
  .main-content h3,
  .main-content h4 { color: #1f2328 !important; }

  .mermaid { width: 100%; overflow-x: auto; }

  .mermaid svg {
    width: 100% !important;
    max-width: none !important;
    height: auto !important;
    min-height: 420px;
  }
</style>
